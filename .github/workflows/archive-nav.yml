name: Archive NAV data

# Runs once daily at 11:30 PM IST (18:00 UTC).
# Downloads NAVAll.txt from AMFI and commits it to nav-archive/YYYY-MM-DD.txt.
# Purpose: disaster-recovery — the full DB can be rebuilt from these files.

# IST = UTC+5:30  →  11:30 PM IST = 18:00 UTC

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download NAVAll.txt
        run: |
          mkdir -p nav-archive
          DATE=$(date -u '+%d-%m-%Y')
          curl -sf "https://portal.amfiindia.com/spages/NAVAll.txt" -o "nav-archive/${DATE}.txt"

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nav-archive/
          git diff --staged --quiet || git commit -m "NAV archive $(date -u '+%d-%m-%Y')"
          git push
